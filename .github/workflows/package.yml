name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Set up Godot
        id: godot
        run: python scripts/setup_godot_ci.py --github-output

      - name: Build portable package
        env:
          GODOT_BIN: ${{ steps.godot.outputs.godot_bin }}
        run: python scripts/build_portable.py --target ${{ matrix.target }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: crayon-shinchan-pet-${{ matrix.target }}
          path: dist/CrayonShinchanPet-*.zip
